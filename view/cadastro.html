<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAMA - Página Inicial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?
family=Poppins:wght@400;500;600;700&
family=Inter:wght@400;500;600&
display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/cadastro.css">
</head>

<body>
    <section class="cadastro section-decorada">
        <div class="header-cad">
        <h2>Cadastro</h2>
        <p class="intro">
            Este é um espaço seguro. Compartilhe apenas o que se sentir confortável.
        </p>
        </div>
        <form>

            <h3>Dados pessoais</h3>

            <label>Nome completo *</label>
            <input type="text" required>

            <label>Data de nascimento *</label>
            <input type="date" required>

            <label>CPF *</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required>

            <label>Estado civil</label>
            <select>
                <option value="">Selecione</option>
                <option>Solteira</option>
                <option>Casada</option>
                <option>União estável</option>
                <option>Divorciada</option>
                <option>Viúva</option>
            </select>

            <label>Escolaridade</label>
            <select>
                <option value="">Selecione</option>
                <option>Ensino fundamental</option>
                <option>Ensino médio</option>
                <option>Ensino superior</option>
                <option>Pós-graduação</option>
            </select>

            <label>Profissão</label>
            <input type="text">

            <h3>Endereço</h3>

            <label>Endereço completo</label>
            <input type="text" placeholder="Rua, número, bairro">

            <label>Cidade / Estado</label>
            <input type="text" disabled>

            <h3>Contato</h3>

            <label>Email *</label>
            <input type="email" required>

            <label>Telefone *</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" required>

            <h3>Informações familiares</h3>

            <label>Quantidade de dependentes</label>
            <input type="number" min="0">

            <label>
                Necessidade especial do(a) filho(a)
            </label>
            <input type="text" placeholder="Ex: autismo, TDAH, deficiência física...">

            <h3>Necessidade</h3>

            <label>Conte um pouco sobre sua necessidade</label>
            <textarea rows="4"></textarea>

            <label class="consentimento">
                <input type="checkbox" required>
                Concordo com o uso dos meus dados apenas para contato da RAMA.
            </label>

            <button type="submit">Enviar cadastro</button>

        </form>
    </section>

</body>

</html>
